<footer class="footer">
  <div class="footer__widgets">
    <div class="container footer__grid">
      <div class="footer__col footer__col--logo">
        <img
          class="footer__logo"
          [src]="data.logo"
          alt="Pinturas Colom"
          width="140"
          height="48"
        />
      </div>

      <div class="footer__col">
        <h3 class="footer__heading">Dirección</h3>
        <address class="footer__address">
          @for (line of data.address; track line) {
            <span>{{ line }}</span>
          }
        </address>
      </div>

      <div class="footer__col">
        <h3 class="footer__heading">Consultas y pedidos</h3>
        <ul class="footer__phones">
          @for (phone of data.phones; track phone) {
            <li>
              <a [href]="telHref(phone)">{{ phone }}</a>
            </li>
          }
        </ul>
      </div>

      <div class="footer__col">
        <h3 class="footer__heading">Enlaces</h3>
        <ul class="footer__links">
          @for (link of data.legalLinks; track link.label) {
            <li>
              <a [href]="link.href">{{ link.label }}</a>
            </li>
          }
        </ul>
      </div>
    </div>
  </div>

  <div class="footer__copyright">
    <div class="container footer__copyright-inner">
      <p>{{ data.copyrightText }}</p>
      <ul class="footer__social" aria-label="Redes sociales">
        <li>
          <a href="#" aria-label="Facebook">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path
                d="M14 9h3V6h-3c-1.7 0-3 1.3-3 3v2H8v3h3v7h3v-7h3l1-3h-4V9c0-.6.4-1 1-1z"
              />
            </svg>
          </a>
        </li>
        <li>
          <a href="#" aria-label="Instagram">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path
                d="M7 2h10a5 5 0 0 1 5 5v10a5 5 0 0 1-5 5H7a5 5 0 0 1-5-5V7a5 5 0 0 1 5-5zm5 5a5 5 0 1 0 0 10 5 5 0 0 0 0-10zm6.5-.9a1.1 1.1 0 1 0 0 2.2 1.1 1.1 0 0 0 0-2.2zM12 9a3 3 0 1 1 0 6 3 3 0 0 1 0-6z"
              />
            </svg>
          </a>
        </li>
      </ul>
    </div>
  </div>
</footer>
