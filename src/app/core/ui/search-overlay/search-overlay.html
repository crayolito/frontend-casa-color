<div
  class="search-overlay"
  role="dialog"
  aria-modal="true"
  aria-label="Buscar productos"
  cdkTrapFocus
  [cdkTrapFocusAutoCapture]="true"
>
  <button type="button" class="search-overlay__close" (click)="close()" aria-label="Cerrar búsqueda">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <path
        d="M6 6l12 12M18 6L6 18"
        stroke="currentColor"
        stroke-width="1.5"
        stroke-linecap="round"
      />
    </svg>
  </button>

  <div class="search-overlay__box">
    <form class="search-overlay__form" (submit)="onSubmit($event)">
      <label class="sr-only" for="search-overlay-input">Buscar</label>
      <input
        id="search-overlay-input"
        class="search-overlay__input"
        type="search"
        name="q"
        placeholder="Start Typing..."
        autocomplete="off"
        [value]="query()"
        (input)="onQueryInput($event)"
      />
    </form>
  </div>
</div>
