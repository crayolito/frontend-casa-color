<header class="header" [class.header--scrolled]="scrolled()">
  <div class="header__inner">
    <a class="header__brand" href="/" aria-label="Pinturas Colom — Inicio">
      <img
        class="header__logo"
        src="/img/logos/logo-colom-small.png"
        srcset="/img/logos/logo-colom-small.png 1x, /img/logos/logo-colom-large.png 2x"
        alt="Pinturas Colom"
        width="100"
        height="102"
      />
    </a>

    <nav class="header__nav" aria-label="Principal">
      <ul class="header__menu">
        @for (item of navItems; track item.label) {
          <li
            class="header__item"
            [class.header__item--open]="isItemOpen(item)"
            (mouseenter)="onItemEnter(item)"
            (mouseleave)="onItemLeave()"
          >
            @if (item.children?.length) {
              <button
                type="button"
                class="header__link header__link--button"
                [attr.aria-expanded]="isItemOpen(item)"
                [attr.aria-controls]="'sub-' + item.label"
                (click)="toggleItem(item)"
              >
                {{ item.label }}
              </button>
              <ul class="header__submenu" [id]="'sub-' + item.label" role="menu">
                @for (child of item.children; track child.label) {
                  <li class="header__submenu-item" role="none">
                    <a class="header__submenu-link" role="menuitem" [href]="child.href">
                      {{ child.label }}
                    </a>
                  </li>
                }
              </ul>
            } @else {
              <a class="header__link" [href]="item.href">{{ item.label }}</a>
            }
          </li>
        }
      </ul>
    </nav>

    <div class="header__actions">
      <button
        type="button"
        class="header__icon-btn header__icon-btn--search"
        aria-label="Abrir búsqueda"
        (click)="openSearch($event.currentTarget)"
      >
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="1.5" />
          <path
            d="M20 20l-3.5-3.5"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-linecap="round"
          />
        </svg>
      </button>

      <button
        type="button"
        class="header__icon-btn header__burger"
        aria-label="Abrir menú"
        (click)="openMobile($event.currentTarget)"
      >
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path
            d="M4 7h16M4 12h16M4 17h16"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
          />
        </svg>
      </button>
    </div>
  </div>
</header>

@if (searchOpen()) {
  <app-search-overlay (closed)="closeSearch()" />
}

@if (mobileOpen()) {
  <app-mobile-menu [items]="mobileItems" (closed)="closeMobile()" />
}
