<app-admin-page-header
  title="Configuración"
  subtitle="Ajustes del sitio (key → JSON)"
/>

@if (flash(); as msg) {
  <p class="admin-flash" role="status">{{ msg }}</p>
}
@if (error(); as err) {
  <app-admin-error-state
    [message]="err.text"
    [correlationId]="err.correlationId ?? null"
    [showCorrelationId]="err.showCorrelationId"
    [showRetry]="err.code !== 'VALIDATION_ERROR'"
    (retry)="onRetryLoad()"
  />
}

<div class="settings">
  <app-admin-tabs
    [tabs]="tabs"
    [active]="selectedKey()"
    (activeChange)="selectKey($event)"
  >
    <form class="settings__form" [formGroup]="form" (ngSubmit)="save()">
      <label class="settings__field">
        <span class="settings__label">Key</span>
        <input class="settings__input" formControlName="key" readonly />
      </label>

      <label class="settings__field">
        <span class="settings__label">Value (JSON)</span>
        <textarea class="settings__textarea" formControlName="valueJson" rows="14"></textarea>
      </label>

      @if (updatedAt(); as at) {
        <p class="settings__meta">Actualizado: {{ at }}</p>
      }

      @if (loading()) {
        <p class="settings__meta">Cargando…</p>
      }

      <div class="settings__actions">
        <app-admin-button type="button" variant="danger" (clicked)="askDelete()">
          Eliminar
        </app-admin-button>
        <app-admin-button type="submit" variant="primary" [loading]="saving()">
          Guardar
        </app-admin-button>
      </div>
    </form>
  </app-admin-tabs>
</div>

<app-admin-confirm-dialog
  [open]="deleteOpen()"
  title="Eliminar setting"
  [message]="'¿Eliminar la key «' + form.controls.key.value + '»?'"
  [loading]="saving()"
  (confirmed)="confirmDelete()"
  (cancelled)="deleteOpen.set(false)"
/>
