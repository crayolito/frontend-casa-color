<section
  class="hero"
  aria-roledescription="carrusel"
  aria-label="Líneas de producto"
  (mouseenter)="pause()"
  (mouseleave)="resume()"
  (focusin)="pause()"
  (focusout)="resume()"
>
  <div class="hero__viewport">
    @for (slide of slides(); track $index; let i = $index) {
      <article
        class="hero__slide"
        [class.hero__slide--active]="current() === i"
        [class.hero__slide--light]="slide.scheme === 'light'"
        [attr.aria-hidden]="current() !== i"
        [style.background-image]="background(slide)"
      >
        <div class="hero__overlay"></div>
        <div
          class="container hero__content"
          [class.hero__content--top]="slide.textPosition === 'top'"
          [class.hero__content--middle]="slide.textPosition === 'middle'"
          [class.hero__content--bottom]="slide.textPosition === 'bottom'"
        >
          <h2 class="hero__title">{{ slide.title }}</h2>
          @if (slide.ctaLabel && slide.ctaHref) {
            <a
              class="hero__cta"
              [class.hero__cta--deco]="slide.line === 'deco'"
              [class.hero__cta--tecno]="slide.line === 'tecno'"
              [href]="slide.ctaHref"
            >
              {{ slide.ctaLabel }}
            </a>
          }
        </div>
      </article>
    }
  </div>

  <div class="sr-only" aria-live="polite">
    Slide {{ current() + 1 }} de {{ slides().length }}: {{ slides()[current()].title }}
  </div>

  <div class="hero__controls">
    <button type="button" class="hero__nav" (click)="prev()" aria-label="Slide anterior">
      ‹
    </button>
    <button type="button" class="hero__nav" (click)="next()" aria-label="Slide siguiente">
      ›
    </button>
  </div>

  <button
    type="button"
    class="hero__down-arrow"
    aria-label="Bajar al contenido"
    (click)="scrollToContent()"
  >
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <path
        d="M6 9l6 6 6-6"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
    </svg>
  </button>

  <div class="hero__dots" role="tablist" aria-label="Paginación del carrusel">
    @for (slide of slides(); track $index; let i = $index) {
      <button
        type="button"
        class="hero__dot"
        [class.hero__dot--active]="current() === i"
        role="tab"
        [attr.aria-selected]="current() === i"
        [attr.aria-label]="'Ir al slide ' + (i + 1) + ': ' + slide.title"
        (click)="goTo(i)"
      ></button>
    }
  </div>
</section>
