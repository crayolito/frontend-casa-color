<div
  class="fichas-toggle"
  [class.fichas-toggle--open]="open()"
  [attr.data-variant]="variant()"
>
  <!-- Clon: .toggle > h3.toggle-title > a.toggle-heading + i.fa.fa-plus-circle
       (element-toggles.css data-style=default) -->
  <h3 class="fichas-toggle__title">
    <button
      type="button"
      class="fichas-toggle__trigger"
      [attr.aria-expanded]="open()"
      [attr.aria-controls]="panelId()"
      (click)="toggle()"
    >
      <span class="fichas-toggle__icon" aria-hidden="true">
        <!-- Visual equivalente a fa-plus-circle (FA no está en el Angular app) -->
        <svg viewBox="0 0 512 512" width="15" height="15" focusable="false">
          <path
            fill="currentColor"
            d="M256 8C119 8 8 119 8 256s111 248 248 248 248-111 248-248S393 8 256 8zm144 276c0 6.6-5.4 12-12 12h-92v92c0 6.6-5.4 12-12 12h-56c-6.6 0-12-5.4-12-12v-92h-92c-6.6 0-12-5.4-12-12v-56c0-6.6 5.4-12 12-12h92v-92c0-6.6 5.4-12 12-12h56c6.6 0 12 5.4 12 12v92h92c6.6 0 12 5.4 12 12v56z"
          />
        </svg>
      </span>
      <span class="fichas-toggle__label">{{ title() }}</span>
    </button>
  </h3>

  <div
    class="fichas-toggle__panel"
    role="region"
    [id]="panelId()"
    [class.fichas-toggle__panel--open]="open()"
    [attr.aria-hidden]="!open()"
    [attr.inert]="open() ? null : ''"
  >
    <div class="fichas-toggle__panel-inner">
      <ng-content />
    </div>
  </div>
</div>
